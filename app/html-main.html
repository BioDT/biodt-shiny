{{% raw %}}
<!DOCTYPE html>
<html lang="{{ lang() }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="static/favicon.ico" />
    <script defer fetchpriority="high" src="js/tab-index.js" />
    <script defer fetchpriority="high" src="js/tab-switcher.js" />
    <script defer fetchpriority="low" src="js/popover.js" />
    <style media="print">
      .bslib-page-fill, .bslib-gap-spacing, .bslib-flow-mobile, .html-fill-container{padding:2px} .bslib-page-navbar
    </style>
    {{ headContent() }}
    {{ bootstrapLib() }}
  </head>
  <body>
    {{ actionButton("action", name) }}
  </body>
</html>
{{% endraw %}}
